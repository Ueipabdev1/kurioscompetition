<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Crucigrama</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Crucigrama Challenge</h1>
            <div class="game-info">
                <div class="info-item">
                    <span class="label">Nivel:</span>
                    <span id="current-level" class="value">1</span>
                </div>
                <div class="info-item">
                    <span class="label">Intentos:</span>
                    <span id="attempts" class="value">0</span>
                </div>
                <div class="info-item">
                    <span class="label">Puntuación:</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="info-item">
                    <span class="label">Pistas:</span>
                    <span id="hints-left" class="value">3</span>
                </div>
            </div>
        </header>

        <main>
            <div class="game-section">
                <div class="crossword-container">
                    <div id="crossword-grid"></div>
                </div>

                <div class="controls-section">
                    <div class="clues-container">
                        <div class="clues-column">
                            <h3>Horizontales</h3>
                            <ul id="horizontal-clues"></ul>
                        </div>
                        <div class="clues-column">
                            <h3>Verticales</h3>
                            <ul id="vertical-clues"></ul>
                        </div>
                    </div>

                    <div class="buttons-container">
                        <button id="hint-btn" class="btn btn-hint">💡 Usar Pista</button>
                        <button id="check-btn" class="btn btn-check">✓ Verificar</button>
                        <button id="reset-btn" class="btn btn-reset">🔄 Reiniciar Nivel</button>
                    </div>

                    <div id="message" class="message"></div>
                </div>
            </div>
        </main>

        <div id="modal" class="modal">
            <div class="modal-content">
                <h2 id="modal-title"></h2>
                <p id="modal-message"></p>
                <div id="modal-stats"></div>
                <button id="modal-btn" class="btn btn-primary"></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
